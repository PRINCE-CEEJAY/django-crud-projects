 <label class="input w-full mt-2">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
                >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
                </g>
            </svg>
            <input type="search" required placeholder="Search" name="search"
            hx-get="{% url 'search' %}"
            hx-trigger = "keyup delay:500ms"
            hx-target = "#product-list"
            hx-indicator = "#loading"
            hx-on::before-request="document.getElementById('product-list').style.opacity=0.2"
            hx-on::after-request="document.getElementById('product-list').style.opacity=1"
            />
              {% include 'product/partials/spinner.html' %}
        </label>
